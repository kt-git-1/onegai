<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff8e9">
  <title>おねがいチャリン</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: #4b2f22;
      background: #fff8e9;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100svh; display: grid; place-items: center; padding: 32px 20px; }
    main { width: min(100%, 440px); text-align: center; }
    img { width: 156px; height: 146px; object-fit: contain; }
    h1 { margin: 24px 0 10px; font-size: 28px; line-height: 1.35; letter-spacing: 0; }
    p { margin: 0; color: #8b7469; font-size: 15px; line-height: 1.8; }
  </style>
</head>
<body>
  <main>
    <img src="/assets/piggy-bank.png" alt="おねがいチャリン">
    <h1>おねがいチャリン</h1>
    <p>やさしさが、ちゃりんと貯まる。</p>
  </main>
</body>
</html>
